name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ARCHITECTURE.md is only worth writing if something fails when it is broken.
  # These are those somethings. Cheap (grep over the tree), no toolchain needed.
  architecture:
    name: architecture rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Architecture rules (ARCHITECTURE.md)
        run: ./scripts/check-architecture.sh
      - name: Single scene-render path (Rule 5)
        run: ./scripts/check-single-render-path.sh

  check:
    name: clippy + build + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets --all-features
      - name: Build
        run: cargo build --all-targets
      - name: Test
        run: cargo test --all
      # Re-run just the golden tests with output shown. `cargo test` captures
      # stderr for *passing* tests, so without this the measured image deltas are
      # invisible until something already fails. The reference is generated on one
      # backend and checked on the others, so this line is how cross-backend drift
      # becomes visible while there is still headroom to react to it.
      - name: Golden image deltas
        run: cargo test -p cubara-render --test golden -- --nocapture
